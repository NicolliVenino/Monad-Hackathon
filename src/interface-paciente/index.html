<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Atendimento - Tamanho Mobile</title>
    
    <style>
        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', 'Helvetica Neue', sans-serif; 
        }

        /* Fundo do navegador (fora do app) */
        body {
            background-color: #e2e8f0; /* Cinza claro para destacar a área do app */
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            min-height: 100vh;
        }

        /* Container com as dimensões de um celular */
        .mobile-container {
            width: 100%;
            max-width: 400px; /* Largura máxima típica de um celular */
            min-height: 100vh; /* Ocupa a altura toda */
            background-color: #f7f7f7; /* Cor de fundo do seu design */
            
            /* Sombra muito suave apenas para separar do fundo do monitor */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05); 
            
            /* Organização interna */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 25px; /* Reduzi um pouco o topo para acomodar a imagem */
            gap: 40px; /* Distância entre os blocos */
        }

        /* --------------------------------------------------- */
        /* ESTILOS DA IMAGEM E COMPONENTES                     */
        /* --------------------------------------------------- */

        /* Container da imagem do topo */
        .logo-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: -10px; /* Aproxima um pouco mais a imagem do primeiro input */
        }

        /* Configuração do tamanho da imagem */
        .logo-wrapper img {
            width: 100px; /* Ajuste este valor para deixar a imagem maior ou menor */
            height: auto;
            object-fit: contain;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        label {
            color: #0d6e7a;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            width: 100%;
            border: 1px solid #7a7a7a;
            border-radius: 25px;
            padding: 12px 15px;
            background-color: transparent;
        }

        .input-wrapper svg {
            width: 24px;
            height: 24px;
            stroke: #666;
            flex-shrink: 0;
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 20px;
            color: #333;
            margin-left: 10px;
            font-weight: 300;
        }

        .input-wrapper input::placeholder {
            color: #999;
        }

        .input-wrapper:focus-within {
            border-color: #0d6e7a;
        }

        .btn-buscar {
            margin-top: 10px;
            padding: 12px 40px;
            border: 2px solid #0d6e7a;
            border-radius: 25px;
            background-color: transparent;
            color: #0d6e7a;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
        }

        .btn-buscar:hover {
            background-color: #0d6e7a;
            color: #fff;
        }

        .btn-buscar:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <main class="mobile-container">
        
        <div class="logo-wrapper">
            <img src="assets/logoMedIn.jpeg" alt="Logo Caduceu Robótico">
        </div>
        
        <div class="input-group">
            <label for="atendimento">Selecione o Atendimento</label>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="atendimento" placeholder="Clinica Geral">
            </div>
        </div>

        <div class="input-group">
            <label for="localizacao">Localização</label>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                    <circle cx="12" cy="10" r="3"></circle>
                </svg>
                <input type="text" id="localizacao" placeholder="Ex: São Paulo">
            </div>
        </div>

        <button type="button" class="btn-buscar">Buscar</button>

    </main>

</body>
</html>
