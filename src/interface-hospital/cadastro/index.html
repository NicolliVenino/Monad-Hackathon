<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Cadastro Hospitalar - Monad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-panel">
        <div class="header-section">
            <h2>Cadastro</h2>
        </div>

        <div class="form-container">
            <div class="form-section">
                <label class="label-text">Identificação</label>
                <input type="text" class="input-field" placeholder="Nome do Hospital">
                
                <label class="label-text">Localização</label>
                <input type="text" class="input-field" placeholder="Cidade/UF">

                <label class="label-text">Wallet Address</label>
                <input type="text" class="input-field" placeholder="0x...">
            </div>

            <div class="form-section">
                <label class="label-text">Vagas Disponíveis</label>
                <div class="vagas-grid">
                    <input type="number" class="input-field" placeholder="Geral">
                    <input type="number" class="input-field" placeholder="Pediatria">
                    <input type="number" class="input-field" placeholder="Ortopedia">
                    <input type="number" class="input-field" placeholder="Cardio">
                </div>
            </div>
        </div>

        <div class="footer-section">
            <button class="btn-register" id="btnCadastrar">Registrar na Monad</button>
        </div>
    </div>

    <script>
        document.getElementById('btnCadastrar').addEventListener('click', () => {
            alert("Enviando dados para a rede Monad...");
        });
    </script>
</body>
</html>
