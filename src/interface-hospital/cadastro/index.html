<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedIn - Cadastro Hospitalar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-panel">

        <div class="header-section">
            <a href="../../interface-paciente/index.html" class="btn-back">← Voltar ao App</a>
            <h2>Cadastro do Hospital</h2>
            <p class="header-sub">Registre seu hospital na blockchain Monad</p>
        </div>

        <!-- Status blockchain -->
        <div class="blockchain-status" id="blockchainStatus">
            <div class="status-dot loading" id="statusDot"></div>
            <span id="statusText">Verificando conexão com MetaMask...</span>
        </div>

        <div class="form-container">
            <div class="form-section">
                <label class="label-text">Nome do Hospital</label>
                <input id="hospitalNome" type="text" class="input-field" placeholder="Nome completo do hospital">

                <label class="label-text">Localização (Cidade/UF)</label>
                <input id="hospitalLocalizacao" type="text" class="input-field" placeholder="Ex: São Paulo, SP">

                <label class="label-text">Wallet Address</label>
                <input id="hospitalWallet" type="text" class="input-field" placeholder="0x...">
                <p class="field-hint">Endereço que poderá atualizar as vagas depois</p>
            </div>

            <div class="form-section">
                <label class="label-text">Vagas Disponíveis</label>
                <div class="vagas-grid">
                    <div class="vaga-item">
                        <span class="vaga-label">Clínico Geral</span>
                        <input id="vagasGeral" type="number" class="input-field" placeholder="0" min="0">
                    </div>
                    <div class="vaga-item">
                        <span class="vaga-label">Pediatria</span>
                        <input id="vagasPediatria" type="number" class="input-field" placeholder="0" min="0">
                    </div>
                    <div class="vaga-item">
                        <span class="vaga-label">Ortopedia</span>
                        <input id="vagasOrtopedia" type="number" class="input-field" placeholder="0" min="0">
                    </div>
                    <div class="vaga-item">
                        <span class="vaga-label">Cardiologia</span>
                        <input id="vagasCardio" type="number" class="input-field" placeholder="0" min="0">
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-section">
            <button class="btn-register" id="btnCadastrar">Registrar na Monad</button>
        </div>

        <p id="statusCadastro" class="status-msg" aria-live="polite"></p>

        <!-- Link para gestão após cadastro (aparece depois do sucesso) -->
        <div id="linkGestao" class="link-gestao" style="display:none">
            <p>Hospital cadastrado com ID: <strong id="hospitalIdRegistrado">—</strong></p>
            <a id="btnIrGestao" href="../gestao_de_vagas/index.html" class="btn-link-gestao">
                Gerenciar Vagas →
            </a>
        </div>

        <div class="nav-links">
            <a href="../gestao_de_vagas/index.html">Já tem cadastro? Gerenciar vagas →</a>
        </div>

    </div>

    <script src="./ethers.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
